<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yacamin Rafael - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #140a0a;
            --surface: #1e1111;
            --border: #3a1e1e;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --accent: #c53030;
            --red: #ef4444;
        }

        body {
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }

        .login-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            color: var(--red);
            font-size: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">YACAMIN RAFAEL</div>
        <div class="login-subtitle">Dashboard de Trading</div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input class="form-input" type="password" id="password" autocomplete="current-password" autofocus required>
            </div>
            <button class="login-btn" type="submit" id="login-btn">Entrar</button>
        </form>

        <div class="error-msg" id="error-msg"></div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('error-msg');
            const password = document.getElementById('password').value;

            btn.disabled = true;
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Senha incorreta';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Erro de conexao';
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
